info:
  contact: {}
paths:
  /api/metrics/{id}/values:
    get:
      parameters:
      - description: Metric ID (UUID)
        in: path
        name: id
        required: true
        type: string
      - description: Technology ID (UUID)
        in: query
        name: technology_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/httpapi.MetricValueResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
      summary: Get metric value for technology
      tags:
      - catalog
  /api/preferences:
    post:
      consumes:
      - application/json
      parameters:
      - description: Preferences payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/httpapi.PreferencesSaveRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/httpapi.PreferencesSaveResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
      summary: Save preferences
      tags:
      - preferences
  /api/preferences/{user_id}:
    get:
      parameters:
      - description: User ID
        in: path
        name: user_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/httpapi.PreferencesGetResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httpapi.ErrorResponse'
      summary: Get preferences by user id
      tags:
      - preferences
  /healthz:
    get:
      description: Returns service liveness status
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: Health check
      tags:
      - system
swagger: "2.0"
