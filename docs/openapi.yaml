openapi: 3.0.3
info:
  title: RadarTcell API
  version: "1.0.0"
  description: OpenAPI spec for RadarTcell backend (public + basic admin auth)

servers:
  - url: http://localhost:8080

tags:
  - name: System
    description: Health and readiness endpoints
  - name: Admin
    description: Admin authentication and protected endpoints
  - name: Catalog
    description: Catalog lists and catalog item details
  - name: Technology
    description: Technology listing and filtering endpoints
  - name: Preferences
    description: User preferences endpoints
paths:
  /healthz:
    get:
      tags:
        - System
      summary: Health check
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

  /readyz:
    get:
      tags: [System]
      summary: Readiness check
      responses:
        "200":
          description: Ready
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ready
        "503":
          description: DB not ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/admin/login:
    post:
      tags: [Admin]
      summary: Admin login
      description: Возвращает JWT токен администратора
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminLoginRequest"
      responses:
        "200":
          description: Успешный вход
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminLoginResponse"
        "400":
          description: Неверный JSON / ошибка валидации
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Неверный логин или пароль
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/admin/me:
    get:
      tags: [Admin]
      summary: Current admin user
      description: Проверка токена и получение информации о текущем администраторе
      security:
        - BearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminMeResponse"
        "401":
          description: Нет токена / токен невалидный
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/trends:
    get:
      tags: [Catalog]
      summary: List trends
      description: Возвращает список трендов
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrendListResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/sdgs:
    get:
      tags: [Catalog]
      summary: List SDGs
      description: Возвращает список SDG
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SDGListResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/tags:
    get:
      tags: [Catalog]
      summary: List tags
      description: Возвращает список тегов
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagListResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/organizations:
    get:
      tags: [Catalog]
      summary: List organizations
      description: Возвращает список организаций
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrganizationListResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/organizations/{slug}:
    get:
      tags: [Catalog]
      summary: Get organization by slug
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
            example: openai
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrganizationItem"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/metrics:
    get:
      tags: [Catalog]
      summary: List metrics
      description: Возвращает список метрик
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MetricListResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/metrics/{id}/values:
    get:
      tags: [Catalog]
      summary: Get metric value for technology
      description: Возвращает значение метрики для указанной технологии
      parameters:
        - name: id
          in: path
          required: true
          description: Metric ID (UUID)
          schema:
            type: string
            format: uuid
            example: 26dea5c3-6eb3-407a-927c-414c787c0cdf
        - name: technology_id
          in: query
          required: true
          description: Technology ID (UUID)
          schema:
            type: string
            format: uuid
            example: 5ab5c441-465e-423b-a940-b47fbfaf088b
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MetricValueResponse"
        "400":
          description: Bad request (missing/invalid parameters)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Metric or technology not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/technologies:
    get:
      tags: [Technology]
      summary: List technologies
      description: Возвращает список технологий с пагинацией и фильтрами
      parameters:
        - name: page
          in: query
          required: false
          description: Номер страницы
          schema:
            type: integer
            minimum: 1
            default: 1
            example: 1
        - name: limit
          in: query
          required: false
          description: Кол-во элементов на страницу
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
            example: 20
        - name: search
          in: query
          required: false
          description: Поиск по названию/описанию
          schema:
            type: string
            example: edge
        - name: highlight
          in: query
          required: false
          description: |
            Повторяемый параметр highlight.
            Примеры:
            - tag:ml
            - trend:ai
            - organization:openai
          schema:
            type: string
            example: tag:ml
          style: form
          explode: true
      responses:
        "200":
          description: OK
          headers:
            X-Total-Count:
              description: Общее количество записей
              schema:
                type: integer
                example: 2
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TechnologyListResponse"
        "400":
          description: Invalid query params
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/technologies/{slug}:
    get:
      tags: [Technology]
      summary: Get technology by slug
      description: Возвращает технологию по slug
      parameters:
        - name: slug
          in: path
          required: true
          description: Slug технологии
          schema:
            type: string
            example: edge-llm
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TechnologyDetailsResponse"
        "404":
          description: Technology not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/trends/{slug}/technologies:
    get:
      tags: [Technology]
      summary: List technologies by trend
      description: Возвращает технологии для указанного тренда
      parameters:
        - name: slug
          in: path
          required: true
          description: Slug тренда
          schema:
            type: string
            example: ai
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        "200":
          description: OK
          headers:
            X-Total-Count:
              description: Общее количество записей
              schema:
                type: integer
                example: 2
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TechnologyListResponse"
        "400":
          description: Invalid query params
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Trend not found / no data (зависит от реализации)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/sdgs/{code}/technologies:
    get:
      tags: [Technology]
      summary: List technologies by SDG code
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
            example: SDG 09
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        "200":
          description: OK
          headers:
            X-Total-Count:
              description: Total count
              schema:
                type: integer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TechnologyListResponse"
        "400":
          description: Invalid query params
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/tags/{slug}/technologies:
    get:
      tags: [Technology]
      summary: List technologies by tag
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
            example: ml
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        "200":
          description: OK
          headers:
            X-Total-Count:
              description: Total count
              schema:
                type: integer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TechnologyListResponse"
        "400":
          description: Invalid query params
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/organizations/{slug}/technologies:
    get:
      tags: [Technology]
      summary: List technologies by organization
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
            example: openai
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        "200":
          description: OK
          headers:
            X-Total-Count:
              description: Total count
              schema:
                type: integer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TechnologyListResponse"
        "400":
          description: Invalid query params
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/preferences:
    post:
      tags: [Preferences]
      summary: Save user preferences
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PreferencesSaveRequest"
      responses:
        "200":
          description: Saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PreferencesSaveResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/preferences/{user_id}:
    get:
      tags: [Preferences]
      summary: Get user preferences
      parameters:
        - in: path
          name: user_id
          required: true
          schema:
            type: string
            example: u1
      responses:
        "200":
          description: Preferences
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PreferencesGetResponse"
        "400":
          description: Invalid user_id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
          example: not found

    AdminLoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          example: admin
        password:
          type: string
          example: admin123

    AdminLoginResponse:
      type: object
      required: [token]
      properties:
        token:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...

    AdminMeResponse:
      type: object
      required: [role, user]
      properties:
        role:
          type: string
          example: admin
        user:
          type: string
          example: admin

    PreferencesSaveRequest:
      type: object
      required: [user_id, settings]
      properties:
        user_id:
          type: string
          example: u1
        settings:
          type: object
          additionalProperties: true
          example:
            show_tail: true
            magnetic_label: false

    PreferencesSaveResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          example: ok

    PreferencesGetResponse:
      type: object
      required: [user_id, settings]
      properties:
        user_id:
          type: string
          example: u1
        settings:
          type: object
          additionalProperties: true
          example:
            show_tail: true
            magnetic_label: false

    OrganizationItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: 4d71eb69-1a38-4b7b-800b-34cb013fa044
        slug:
          type: string
          example: openai
        name:
          type: string
          example: OpenAI
        logo_url:
          type: string
          nullable: true
          example: https://example.com/openai.png
        technologies_count:
          type: integer
          nullable: true
          example: 2

    OrganizationListResponse:
      type: array
      items:
        $ref: "#/components/schemas/OrganizationItem"

    MetricListItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: 26dea5c3-6eb3-407a-927c-414c787c0cdf
        name:
          type: string
          example: Custom Metric 01
        type:
          type: string
          enum: [bubble, bar, distance]
          example: bubble
        description:
          type: string
          nullable: true
          example: Example metric
        orderable:
          type: boolean
          example: true
        field_key:
          type: string
          nullable: true
          example: custom_metric_1

    MetricListResponse:
      type: array
      items:
        $ref: "#/components/schemas/MetricListItem"

    MetricValueResponse:
      type: object
      required:
        - metric_id
        - metric_name
        - technology_id
        - type
        - value
      properties:
        metric_id:
          type: string
          format: uuid
          example: 26dea5c3-6eb3-407a-927c-414c787c0cdf
        metric_name:
          type: string
          example: Custom Metric 01
        technology_id:
          type: string
          format: uuid
          example: 5ab5c441-465e-423b-a940-b47fbfaf088b
        type:
          type: string
          enum: [bubble, bar, distance]
          example: bubble
        field_key:
          type: string
          nullable: true
          example: custom_metric_1
        value:
          type: number
          nullable: true
          description: Числовое значение метрики (целое или дробное)
          example: 0.7

    TrendListItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: 319bdf5b-2189-4fef-ba3e-053c2005d409
        slug:
          type: string
          example: ai
        name:
          type: string
          example: Artificial Intelligence
        description:
          type: string
          nullable: true
          example: AI-related trends
        order_index:
          type: integer
          example: 1
        technologies_count:
          type: integer
          nullable: true
          example: 2

    TrendListResponse:
      type: array
      items:
        $ref: "#/components/schemas/TrendListItem"

    TagListItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        slug:
          type: string
          example: ml
        title:
          type: string
          example: Machine Learning
        category:
          type: string
          nullable: true
          example: Domain
        description:
          type: string
          nullable: true
          example: smoke
        technologies_count:
          type: integer
          nullable: true
          example: 1

    TagListResponse:
      type: array
      items:
        $ref: "#/components/schemas/TagListItem"

    SDGListItem:
      type: object
      properties:
        id:
          type: integer
          example: 1
        code:
          type: string
          example: SDG 09
        title:
          type: string
          example: Industry, Innovation and Infrastructure
        technologies_count:
          type: integer
          nullable: true
          example: 3

    SDGListResponse:
      type: array
      items:
        $ref: "#/components/schemas/SDGListItem"

    TechnologyTrendRef:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: fe8ba37b-e637-429b-a0be-5e753d642602
        slug:
          type: string
          example: ai
        name:
          type: string
          example: Artificial Intelligence

    TechnologyTagRef:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: a39f63de-a2dd-4ff8-a051-bb8517b465e2
        slug:
          type: string
          example: ml
        title:
          type: string
          example: Machine Learning
        category:
          type: string
          nullable: true
          example: Domain

    TechnologySDGRef:
      type: object
      properties:
        id:
          type: integer
          example: 1
        code:
          type: string
          example: SDG 09
        title:
          type: string
          example: Industry, Innovation and Infrastructure

    TechnologyOrganizationRef:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: 4d71eb69-1a38-4b7b-800b-34cb013fa044
        slug:
          type: string
          example: openai
        name:
          type: string
          example: OpenAI
        logo_url:
          type: string
          nullable: true
          example: https://example.com/openai.png

    TechnologyListItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        slug:
          type: string
          example: edge-llm
        index:
          type: integer
          example: 1
        name:
          type: string
          example: Edge LLM
        description_short:
          type: string
          nullable: true
          example: LLM on device
        trl:
          type: integer
          minimum: 1
          maximum: 9
          example: 6
        trend_id:
          type: string
          format: uuid
          nullable: true
        trend_slug:
          type: string
          nullable: true
          example: ai
        trend_name:
          type: string
          nullable: true
          example: Artificial Intelligence
        image_url:
          type: string
          nullable: true
          example: https://example.com/edge-llm.png
        source_link:
          type: string
          nullable: true
          example: https://example.com/source

    TechnologyListResponse:
      type: object
      required: [page, limit, total, items]
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 20
        total:
          type: integer
          example: 2
        items:
          type: array
          items:
            $ref: "#/components/schemas/TechnologyListItem"

    TechnologyDetailsResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: 5ab5c441-465e-423b-a940-b47fbfaf088b
        slug:
          type: string
          example: edge-llm
        index:
          type: integer
          example: 1
        name:
          type: string
          example: Edge LLM
        description_short:
          type: string
          nullable: true
          example: LLM on device
        description_full:
          type: string
          nullable: true
          example: Full description of the technology
        trl:
          type: integer
          minimum: 1
          maximum: 9
          example: 6
        trend_id:
          type: string
          format: uuid
          nullable: true
        trend_slug:
          type: string
          nullable: true
          example: ai
        trend_name:
          type: string
          nullable: true
          example: Artificial Intelligence
        trend:
          $ref: "#/components/schemas/TechnologyTrendRef"
        image_url:
          type: string
          nullable: true
          example: https://example.com/edge-llm.png
        source_link:
          type: string
          nullable: true
          example: https://example.com/source
        custom_metric_1:
          type: number
          nullable: true
          example: 0.7
        custom_metric_2:
          type: number
          nullable: true
          example: 0.4
        custom_metric_3:
          type: number
