    get:
      tags: [Catalog]
      summary: Get metric value for technology
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: technology_id
          in: query
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MetricValueResponse" }
        "400":
          description: Invalid
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "404":
          description: Not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /api/technologies:
    get:
      tags: [Technology]
      summary: List technologies
      parameters:
        - name: page
          in: query
          required: false
          schema: { type: integer, minimum: 1, default: 1 }
        - name: limit
          in: query
          required: false
          schema: { type: integer, minimum: 1, maximum: 200, default: 20 }
        - name: search
          in: query
          required: false
          schema: { type: string }
        - name: trend_id
          in: query
          required: false
          schema: { type: string, format: uuid }
        - name: sdg_id
          in: query
          required: false
          schema: { type: string, format: uuid }
        - name: tag_id
          in: query
          required: false
          schema: { type: string, format: uuid }
        - name: organization_id
          in: query
          required: false
          schema: { type: string, format: uuid }
        - name: trl_min
          in: query
          required: false
          schema: { type: integer, minimum: 1, maximum: 9 }
        - name: trl_max
          in: query
          required: false
          schema: { type: integer, minimum: 1, maximum: 9 }
        - name: sort_by
          in: query
          required: false
          schema:
            type: string
          description: "Sort by name or any orderable metric field_key"
        - name: order
          in: query
          required: false
          schema: { type: string, enum: [asc, desc] }
        - name: highlight
          in: query
          required: false
          description: Repeatable, e.g. highlight=tag:ml&highlight=trend:ai
          style: form
          explode: true
          schema:
            type: array
            items: { type: string }
        - name: locale
          in: query
          required: false
          schema: { type: string, example: "ru" }
      responses:
        "200":
          description: OK
          headers:
            X-Total-Count:
              schema: { type: integer }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TechnologyListResponse" }

  /api/technologies/{slug}:
    get:
      tags: [Technology]
      summary: Get technology by slug
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string }
        - name: locale
          in: query
          required: false
          schema: { type: string, example: "ru" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TechnologyDetailsResponse" }
        "404":
          description: Not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /api/trends/{slug}/technologies:
    get:
      tags: [Technology]
      summary: List technologies by trend
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string }
        - name: locale
          in: query
          required: false
          schema: { type: string, example: "ru" }
      responses:
        "200":
          description: OK
          headers:
            X-Total-Count:
              schema: { type: integer }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TechnologyListResponse" }

  /api/sdgs/{code}/technologies:
    get:
      tags: [Technology]
      summary: List technologies by SDG code
      parameters:
        - name: code
          in: path
          required: true
          schema: { type: string, example: "SDG 09" }
        - name: locale
          in: query
          required: false
          schema: { type: string, example: "ru" }
      responses:
        "200":
          description: OK
          headers:
            X-Total-Count:
              schema: { type: integer }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TechnologyListResponse" }

  /api/tags/{slug}/technologies:
    get:
      tags: [Technology]
      summary: List technologies by tag
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string }
        - name: locale
          in: query
          required: false
          schema: { type: string, example: "ru" }
      responses:
        "200":
          description: OK
          headers:
            X-Total-Count:
              schema: { type: integer }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TechnologyListResponse" }

  /api/organizations/{slug}/technologies:
    get:
      tags: [Technology]
      summary: List technologies by organization
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string }
        - name: locale
          in: query
          required: false
          schema: { type: string, example: "ru" }
      responses:
        "200":
          description: OK
          headers:
            X-Total-Count:
              schema: { type: integer }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TechnologyListResponse" }

  # ---------------- PUBLIC: PREFERENCES ----------------
  /api/preferences:
    post:
      tags: [Preferences]
      summary: Save user preferences
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PreferencesSaveRequest" }
      responses:
        "200":
          description: Saved
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PreferencesSaveResponse" }
        "400":
          description: Invalid
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /api/preferences/{user_id}:
    get:
      tags: [Preferences]
      summary: Get user preferences
      parameters:
        - name: user_id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PreferencesGetResponse" }
        "404":
          description: Not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error: { type: string, example: not found }

    # -------- ADMIN AUTH --------
    AdminLoginRequest:
      type: object
      required: [username, password]
      properties:
        username: { type: string, example: admin }
        password: { type: string, example: admin123 }

    AdminLoginResponse:
      type: object
      required: [token]
      properties:
        token: { type: string, example: "eyJhbGciOi..." }

    AdminMeResponse:
      type: object
      required: [role, user]
      properties:
        role: { type: string, example: admin }
        user: { type: string, example: admin }

    AdminIdResponse:
      type: object
      required: [id]
      properties:
        id: { type: string, format: uuid }

    AdminIdSlugResponse:
      type: object
      required: [id, slug]
      properties:
        id: { type: string, format: uuid }
        slug: { type: string }

    AdminCodeResponse:
      type: object
      required: [code]
      properties:
        code: { type: string, example: "SDG 09" }

    AdminCodeIdResponse:
      type: object
      required: [code, id]
      properties:
        code: { type: string, example: "SDG 09" }
        id: { type: string, format: uuid }

    # -------- ADMIN REQUESTS --------
    AdminTrendCreate:
      type: object
      required: [slug, name, order_index]
      properties:
        slug: { type: string }
        name: { type: string }
        description: { type: string, nullable: true }
        image_url: { type: string, nullable: true }
        order_index: { type: integer }

    AdminTrendUpdate:
      type: object
      required: [name, order_index]
      properties:
        name: { type: string }
        description: { type: string, nullable: true }
        image_url: { type: string, nullable: true }
        order_index: { type: integer }

    AdminTrend:
      type: object
      required: [id, slug, name, order_index]
      properties:
        id: { type: string, format: uuid }
        slug: { type: string }
        name: { type: string }
        description: { type: string, nullable: true }
        image_url: { type: string, nullable: true }
        order_index: { type: integer }

    AdminSDG:
      type: object
      required: [id, code, title]
      properties:
        id: { type: string, format: uuid }
        code: { type: string, example: "SDG 09" }
        title: { type: string }
        description: { type: string, nullable: true }
        icon: { type: string, nullable: true }

    AdminTechnology:
      type: object
      required: [id, slug, index, name, trl, trend_slug]
      properties:
        id: { type: string, format: uuid }
        slug: { type: string }
        index: { type: integer }
        name: { type: string }
        trl: { type: integer, minimum: 1, maximum: 9 }
        trend_slug: { type: string }
        trend_name: { type: string, nullable: true }
        description_short: { type: string, nullable: true }
        description_full: { type: string, nullable: true }
        image_url: { type: string, nullable: true }
        source_link: { type: string, nullable: true }
        tag_slugs: { type: array, items: { type: string } }
        sdg_codes: { type: array, items: { type: string } }
        organization_slugs: { type: array, items: { type: string } }
        custom_metric_1: { type: number, nullable: true }
        custom_metric_2: { type: number, nullable: true }
        custom_metric_3: { type: number, nullable: true }
        custom_metric_4: { type: number, nullable: true }

    AdminTagCreate:
      type: object
      required: [slug, title, category]
      properties:
        slug: { type: string }
        title: { type: string }
        category: { type: string, example: Domain }
        description: { type: string, nullable: true }

    AdminTagUpdate:
      type: object
      required: [title, category]
      properties:
        title: { type: string }
        category: { type: string }
        description: { type: string, nullable: true }

    AdminOrganizationCreate:
      type: object
      required: [slug, name]
      properties:
        slug: { type: string }
        name: { type: string }
        logo_url: { type: string, nullable: true }
        description: { type: string, nullable: true }
        website: { type: string, nullable: true }
        headquarters: { type: string, nullable: true }

    AdminOrganizationUpdate:
      type: object
      required: [name]
      properties:
        name: { type: string }
        logo_url: { type: string, nullable: true }
        description: { type: string, nullable: true }
        website: { type: string, nullable: true }
        headquarters: { type: string, nullable: true }

    AdminMetricCreate:
      type: object
      required: [name, type, orderable]
      properties:
        name: { type: string }
        type: { type: string, enum: [bubble, bar, distance] }
        description: { type: string, nullable: true }
        orderable: { type: boolean }
        field_key: { type: string, nullable: true }

    AdminMetricUpdate:
      allOf:
        - $ref: "#/components/schemas/AdminMetricCreate"

    AdminTechnologyCreate:
      type: object
      required: [slug, index, name, trl, trend_slug]
      properties:
        slug: { type: string }
        index: { type: integer }
        name: { type: string }
        trl: { type: integer, minimum: 1, maximum: 9 }
        trend_slug: { type: string }

        description_short: { type: string, nullable: true }
        description_full: { type: string, nullable: true }
        image_url: { type: string, nullable: true }
        source_link: { type: string, nullable: true }

        tag_slugs: { type: array, items: { type: string } }
        sdg_codes: { type: array, items: { type: string } }
        organization_slugs: { type: array, items: { type: string } }

        custom_metric_1: { type: number, nullable: true }
        custom_metric_2: { type: number, nullable: true }
        custom_metric_3: { type: number, nullable: true }
        custom_metric_4: { type: number, nullable: true }

    AdminTechnologyUpdate:
      allOf:
        - $ref: "#/components/schemas/AdminTechnologyCreate"

    AdminSDGCreate:
      type: object
      required: [code, title]
      properties:
        code: { type: string, example: "SDG 09" }
        title: { type: string }
        description: { type: string, nullable: true }
        icon: { type: string, nullable: true }

    AdminSDGUpdate:
      type: object
      required: [title]
      properties:
        title: { type: string }
        description: { type: string, nullable: true }
        icon: { type: string, nullable: true }

    # -------- PUBLIC: PREFERENCES --------
    PreferencesSaveRequest:
      type: object
      required: [user_id, settings]
      properties:
        user_id: { type: string, example: u1 }
        settings:
          type: object
          additionalProperties: true
          example: { show_tail: true, magnetic_label: false }

    PreferencesSaveResponse:
      type: object
      required: [status]
      properties:
        status: { type: string, example: ok }

    PreferencesGetResponse:
      type: object
      required: [user_id, settings]
      properties:
        user_id: { type: string, example: u1 }
        settings:
          type: object
          additionalProperties: true
          example: { show_tail: true, magnetic_label: false }

    # -------- PUBLIC: CATALOG LISTS --------
    TrendListItem:
      type: object
      properties:
        id: { type: string, format: uuid }
        slug: { type: string }
        name: { type: string }
        description: { type: string, nullable: true }
        order_index: { type: integer }
        technologies_count: { type: integer, nullable: true }

    TrendListResponse:
      type: array
      items: { $ref: "#/components/schemas/TrendListItem" }

    TagListItem:
      type: object
      properties:
        id: { type: string, format: uuid }
        slug: { type: string }
        title: { type: string }
        category: { type: string, nullable: true }
        description: { type: string, nullable: true }
        technologies_count: { type: integer, nullable: true }

    TagListResponse:
      type: array
      items: { $ref: "#/components/schemas/TagListItem" }

    SDGListItem:
      type: object
      properties:
        id: { type: string, format: uuid }
        code: { type: string }
        title: { type: string }
        description: { type: string, nullable: true }
        icon: { type: string, nullable: true }
        technologies_count: { type: integer, nullable: true }

    SDGListResponse:
      type: array
      items: { $ref: "#/components/schemas/SDGListItem" }

    OrganizationItem:
      type: object
      properties:
        id: { type: string, format: uuid }
        slug: { type: string }
        name: { type: string }
        logo_url: { type: string, nullable: true }
        description: { type: string, nullable: true }
        website: { type: string, nullable: true }
        headquarters: { type: string, nullable: true }
        technologies_count: { type: integer, nullable: true }

    OrganizationListResponse:
      type: array
      items: { $ref: "#/components/schemas/OrganizationItem" }

    MetricListItem:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        type: { type: string, enum: [bubble, bar, distance] }
        description: { type: string, nullable: true }
        orderable: { type: boolean }
        field_key: { type: string, nullable: true }

    MetricListResponse:
      type: array
      items: { $ref: "#/components/schemas/MetricListItem" }

    MetricValueResponse:
      type: object
      required: [metric_id, metric_name, technology_id, type, value]
      properties:
        metric_id: { type: string, format: uuid }
        metric_name: { type: string }
        technology_id: { type: string, format: uuid }
        type: { type: string, enum: [bubble, bar, distance] }
        field_key: { type: string, nullable: true }
        value:
          type: number
          nullable: true
          example: 0.7

    # -------- TECHNOLOGY --------
    TechnologyTagRef:
      type: object
      properties:
        id: { type: string, format: uuid }
        slug: { type: string }
        title: { type: string }
        category: { type: string, nullable: true }

    TechnologySDGRef:
      type: object
      properties:
        id: { type: string, format: uuid }
        code: { type: string }
        title: { type: string }

    TechnologyOrganizationRef:
      type: object
      properties:
        id: { type: string, format: uuid }
        slug: { type: string }
        name: { type: string }
        logo_url: { type: string, nullable: true }

    TechnologyListItem:
      type: object
      properties:
        id: { type: string, format: uuid }
        slug: { type: string }
        index: { type: integer }
        name: { type: string }
        description_short: { type: string, nullable: true }
        trl: { type: integer, minimum: 1, maximum: 9 }
        trend_id: { type: string, format: uuid }
        trend_slug: { type: string }
        trend_name: { type: string }

        custom_metric_1: { type: number, nullable: true }
        custom_metric_2: { type: number, nullable: true }
        custom_metric_3: { type: number, nullable: true }
        custom_metric_4: { type: number, nullable: true }

        custom_metric_1_norm: { type: number }
        custom_metric_2_norm: { type: number }
        custom_metric_3_norm: { type: number }
        custom_metric_4_norm: { type: number }

        angle: { type: number }
        radius: { type: number }

    TechnologyListResponse:
      type: object
      required: [page, limit, total, items]
      properties:
        page: { type: integer }
        limit: { type: integer }
        total: { type: integer }
        items:
          type: array
          items: { $ref: "#/components/schemas/TechnologyListItem" }

    TechnologyDetailsResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        slug: { type: string }
        index: { type: integer }
        name: { type: string }
        description_short: { type: string, nullable: true }
        description_full: { type: string, nullable: true }
        trl: { type: integer, minimum: 1, maximum: 9 }

        trend_id: { type: string, format: uuid }
        trend_slug: { type: string }
        trend_name: { type: string }

        custom_metric_1: { type: number, nullable: true }
        custom_metric_2: { type: number, nullable: true }
        custom_metric_3: { type: number, nullable: true }
        custom_metric_4: { type: number, nullable: true }

        image_url: { type: string, nullable: true }
        source_link: { type: string, nullable: true }

        angle: { type: number }
        radius: { type: number }

        tags:
          type: array
          items: { $ref: "#/components/schemas/TechnologyTagRef" }
        sdgs:
          type: array
          items: { $ref: "#/components/schemas/TechnologySDGRef" }
        organizations:
          type: array
          items: { $ref: "#/components/schemas/TechnologyOrganizationRef" }

    # -------- ADMIN I18N --------
    AdminTrendI18nUpsert:
      type: object
      required: [locale, name]
      properties:
        locale: { type: string }
        name: { type: string }
        description: { type: string, nullable: true }

    AdminTechnologyI18nUpsert:
      type: object
      required: [locale, name]
      properties:
        locale: { type: string }
        name: { type: string }
        description_short: { type: string, nullable: true }
        description_full: { type: string, nullable: true }

    AdminMetricI18nUpsert:
      type: object
      required: [locale, name]
      properties:
        locale: { type: string }
        name: { type: string }
        description: { type: string, nullable: true }

    AdminTrendI18n:
      type: object
      required: [locale, name]
      properties:
        locale: { type: string }
        name: { type: string }
        description: { type: string, nullable: true }

    AdminTechnologyI18n:
      type: object
      required: [locale, name]
      properties:
        locale: { type: string }
        name: { type: string }
        description_short: { type: string, nullable: true }
        description_full: { type: string, nullable: true }

    AdminMetricI18n:
      type: object
      required: [locale, name]
      properties:
        locale: { type: string }
        name: { type: string }
        description: { type: string, nullable: true }
