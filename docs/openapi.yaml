  # ---------------- PUBLIC: CATALOG ----------------
  /api/trends:
    get:
      tags: [Catalog]
      summary: List trends
      parameters:
        - name: locale
          in: query
          required: false
          schema: { type: string, example: "ru" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TrendListResponse" }

  /api/sdgs:
    get:
      tags: [Catalog]
      summary: List SDGs
