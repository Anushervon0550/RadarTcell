<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RadarTcell — Технологический Радар</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0c12;
      --bg2: #11151f;
      --bg3: #1a1f2e;
      --accent: #7c3aed;
      --accent-light: #a78bfa;
      --glow: rgba(124, 58, 237, 0.45);
      --text: #e6edf3;
      --text2: #a3b0c2;
      --text3: #6b7a8f;
      --border: rgba(255,255,255,0.08);
    }

    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { height:100%; overflow:hidden; background:var(--bg); color:var(--text); font-family:'Inter',sans-serif; }

    #app { height:100vh; display:flex; position:relative; }

    .sidebar {
      width: 76px; background: var(--bg2); border-right: 1px solid var(--border);
      display:flex; flex-direction:column; align-items:center; padding:28px 0; gap:12px; z-index:100;
    }
    .logo {
      width:46px; height:46px; background:linear-gradient(135deg,#7c3aed,#a78bfa);
      border-radius:14px; display:flex; align-items:center; justify-content:center;
      font-size:26px; color:white; font-weight:700; box-shadow:0 0 30px var(--glow);
    }
    .nav-item {
      width:54px; height:54px; border-radius:14px; display:flex; align-items:center; justify-content:center;
      font-size:24px; color:var(--text2); transition:all .25s; position:relative; cursor:pointer;
    }
    .nav-item:hover { background:var(--bg3); color:white; transform:scale(1.1); }
    .nav-item.active { background:rgba(124,58,237,0.18); color:var(--accent-light); box-shadow:0 0 0 3px rgba(124,58,237,0.25); }
    .nav-item .tip {
      position:absolute; left:70px; background:var(--bg3); color:white; padding:8px 14px;
      border-radius:8px; font-size:13px; white-space:nowrap; opacity:0; pointer-events:none;
      transition:all .2s; box-shadow:0 10px 30px rgba(0,0,0,0.6);
    }
    .nav-item:hover .tip { opacity:1; left:80px; }

    .main {
      flex:1; position:relative; overflow:hidden;
      background: radial-gradient(circle at center, #1a1f2e 0%, var(--bg) 75%);
      display:flex; align-items:center; justify-content:center;
    }

    #radar-root { transition: transform .4s cubic-bezier(0.23,1,0.32,1); }

    .top-bar {
      position:absolute; top:24px; left:50%; transform:translateX(-50%);
      background:rgba(17,21,31,0.9); backdrop-filter:blur(20px);
      border:1px solid var(--border); border-radius:9999px; padding:8px 16px;
      display:flex; align-items:center; gap:12px; z-index:90; box-shadow:0 10px 40px rgba(0,0,0,0.5);
    }
    .search-input {
      width:340px; background:var(--bg3); border:1px solid var(--border);
      border-radius:9999px; padding:12px 20px; color:white; font-size:15px; outline:none;
    }
    .search-input::placeholder { color:var(--text3); }

    .bottom-bar {
      position:absolute; bottom:32px; left:50%; transform:translateX(-50%);
      background:rgba(17,21,31,0.92); backdrop-filter:blur(20px);
      border:1px solid var(--border); border-radius:9999px; padding:10px;
      display:flex; gap:6px; z-index:90; box-shadow:0 15px 50px rgba(0,0,0,0.5);
    }
    .bb {
      width:48px; height:48px; border-radius:12px; background:transparent; border:none;
      color:var(--text2); font-size:20px; cursor:pointer; transition:all .2s;
    }
    .bb:hover { background:var(--bg3); color:white; }
    .bb.active { background:rgba(124,58,237,0.2); color:var(--accent-light); }

    .trl-panel {
      position:absolute; right:32px; top:50%; transform:translateY(-50%);
      display:flex; flex-direction:column; align-items:center; gap:10px; z-index:80;
    }

    .det {
      position:absolute; right:0; top:0; bottom:0; width:380px; background:var(--bg2);
      border-left:1px solid var(--border); transform:translateX(100%); transition:transform .35s;
      z-index:200; overflow-y:auto;
    }
    .det.open { transform:translateX(0); }

    #boot {
      position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
      flex-direction:column; gap:14px; background:var(--bg); z-index:999;
    }
    .spin {
      width:36px; height:36px; border:3px solid var(--border);
      border-top-color:var(--accent); border-radius:50%; animation:rot .7s linear infinite;
    }
    @keyframes rot { to{transform:rotate(360deg)} }
    .boot-txt { font-size:13px; color:var(--text3); font-family:'Space Grotesk',sans-serif; }

    .toast {
      position:fixed; bottom:24px; right:24px; padding:12px 20px; border-radius:10px;
      font-weight:600; z-index:9999; animation:ti .3s;
    }
    .tok { background:#34d399; color:#000; }
    .terr { background:#f87171; color:white; }
    @keyframes ti { from{opacity:0; transform:translateY(20px)} to{opacity:1} }
  </style>
</head>
<body>

<div id="app">
  <div class="sidebar">
    <div class="logo">R</div>
    <div class="nav-item active" onclick="closeAdm()"><span>⊙</span><div class="tip">Радар</div></div>
    <div class="nav-item" id="nav-search" onclick="toggleSearch()"><span>⌕</span><div class="tip">Поиск</div></div>
    <div class="nav-item" id="nav-legend" onclick="toggleLeg()"><span>◉</span><div class="tip">Легенда</div></div>
    <div class="nav-item" id="nav-filter" onclick="toggleFilters()"><span>☰</span><div class="tip">Фильтры</div></div>
    <div style="flex:1"></div>
    <div class="nav-item" onclick="goAdmin()"><span>⚙</span><div class="tip">Админка</div></div>
  </div>

  <div class="main">
    <div id="boot">
      <div class="spin"></div>
      <div class="boot-txt">Загрузка радара...</div>
    </div>

    <div id="radar-root"></div>

    <div class="top-bar">
      <input type="text" class="search-input" id="searchInput" placeholder="Поиск технологий..."
             oninput="S.search=this.value; redraw()">
    </div>

    <div class="bottom-bar">
      <button class="bb" onclick="resetAll()" title="Сбросить">↺</button>
      <button class="bb" onclick="doZoom(1.15)" title="Приблизить">＋</button>
      <button class="bb" onclick="doZoom(0.85)" title="Отдалить">－</button>
    </div>

    <div class="trl-panel" id="trl-panel"></div>
    <div id="detail-panel" class="det"></div>
  </div>
</div>

<script>
  'use strict';

  const API = 'http://localhost:8080';
  const S = {
    tok: localStorage.getItem('rt_tok') || '',
    techs: [], trends: [], tags: [], sdgs: [], orgs: [], metrics: [],
    search: '', trlMin: 1, trlMax: 9,
    selTrends: new Set(),
    selTech: null,
    zoom: 1, panX: 0, panY: 0,
    showSearch: false, showLegend: false, showFilters: false,
    adminOpen: false
  };

  const CLRS = ['#7c3aed','#06b6d4','#22c55e','#f59e0b','#ef4444','#ec4899','#3b82f6'];

  /* ====================== API ====================== */
  async function req(m, p, b) {
    const h = {'Content-Type': 'application/json'};
    if (S.tok) h['Authorization'] = 'Bearer ' + S.tok;
    const o = {method: m, headers: h};
    if (b) o.body = JSON.stringify(b);
    const r = await fetch(API + p, o);
    if (r.status === 204) return null;
    const txt = await r.text();
    const d = txt ? JSON.parse(txt) : null;
    if (!r.ok) throw d || {error: 'Ошибка'};
    return d;
  }
  const GET = p => req('GET', p);

  /* ====================== LOAD DATA ====================== */
  async function loadAll() {
    const [t, tr, tg, s, o, m] = await Promise.all([
      GET('/api/technologies?limit=200'),
      GET('/api/trends'),
      GET('/api/tags'),
      GET('/api/sdgs'),
      GET('/api/organizations'),
      GET('/api/metrics')
    ]);

    S.techs   = t?.items || [];
    S.trends  = tr || [];
    S.tags    = tg || [];
    S.sdgs    = s || [];
    S.orgs    = o || [];
    S.metrics = m || [];

    console.log(`Загружено: ${S.techs.length} технологий | ${S.trends.length} трендов`);

    if (S.techs.length > 0 && !S.techs[0].angle) {
      assignPositions();
    }
  }

  function assignPositions() {
    const N = S.trends.length || 6;
    const step = (2 * Math.PI) / N;
    S.techs.forEach((tech, i) => {
      const tIdx = S.trends.findIndex(t => t.id === tech.trend_id);
      tech.angle = tIdx >= 0
        ? tIdx * step + (Math.random() * 0.8 - 0.4)
        : (i * 0.35) % (2 * Math.PI);
      const trlNorm = Math.max(1, Math.min(9, tech.trl || 5)) / 9;
      tech.radius = 0.3 + trlNorm * 0.62 + (Math.random() * 0.1 - 0.05);
    });
  }

  /* ====================== RENDER RADAR ====================== */
  const SZ = 1000, CX = 500, CY = 500, IR = 60, MR = 420;

  function buildSVG() {
    const list = vis();
    const N = S.trends.length || 8;
    const sw = (2 * Math.PI) / N;

    let svg = `<svg id="rsvg" viewBox="0 0 ${SZ} ${SZ}" xmlns="http://www.w3.org/2000/svg" width="min(90vw,90vh)" height="min(90vw,90vh)">`;

    svg += `<defs>
      <radialGradient id="rbg" cx="50%" cy="50%"><stop offset="0%" stop-color="#1a2338"/><stop offset="100%" stop-color="#0a0c12"/></radialGradient>
      <filter id="glow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    </defs>`;

    svg += `<circle cx="${CX}" cy="${CY}" r="${MR+140}" fill="url(#rbg)"/>`;

    for (let i = 0; i < N; i++) {
      const a1 = i * sw - Math.PI/2;
      const a2 = (i+1) * sw - Math.PI/2;
      const c = CLRS[i % CLRS.length];
      const R = MR + 10;
      svg += `<path d="M${CX} ${CY} L${CX+R*Math.cos(a1)} ${CY+R*Math.sin(a1)} A${R} ${R} 0 0 1 ${CX+R*Math.cos(a2)} ${CY+R*Math.sin(a2)} Z" fill="${c}" fill-opacity="0.06" stroke="${c}" stroke-opacity="0.15"/>`;
    }

    for (let i = 1; i <= 9; i++) {
      const r = IR + (i/9)*(MR-IR);
      svg += `<circle cx="${CX}" cy="${CY}" r="${r}" fill="none" stroke="rgba(255,255,255,${i%3===0?0.12:0.04})" stroke-width="${i%3===0?2:1}"/>`;
      if (i % 3 === 0) svg += `<text x="${CX+r+8}" y="${CY-4}" fill="rgba(255,255,255,0.25)" font-size="9" font-family="Space Grotesk">TRL ${i}</text>`;
    }

    list.forEach(tech => {
      const ang = (tech.angle || 0) - Math.PI/2;
      const rad = tech.radius || 0.5;
      const r2 = IR + rad * (MR - IR);
      const x = CX + Math.cos(ang) * r2;
      const y = CY + Math.sin(ang) * r2;
      const c = CLRS[S.trends.findIndex(t => t.id === tech.trend_id) % CLRS.length] || '#7c3aed';

      svg += `<g data-id="${tech.id}" data-slug="${tech.slug}" class="dot-group" style="cursor:pointer">
        <circle cx="${x}" cy="${y}" r="6" fill="${c}" filter="url(#glow)" opacity="0.95"/>
        <text x="${x}" y="${y-18}" text-anchor="middle" fill="${c}" font-size="11" font-weight="500">${tech.name}</text>
      </g>`;
    });

    svg += `</svg>`;
    return svg;
  }

  function vis() {
    return S.techs.filter(t => {
      if (S.search && !t.name?.toLowerCase().includes(S.search.toLowerCase())) return false;
      if (S.selTrends.size && !S.selTrends.has(t.trend_id)) return false;
      if (t.trl < S.trlMin || t.trl > S.trlMax) return false;
      return true;
    });
  }

  /* ====================== RENDER ====================== */
  function render() {
    document.getElementById('radar-root').innerHTML = buildSVG();
    document.querySelectorAll('.dot-group').forEach(el => {
      el.addEventListener('click', () => {
        const slug = el.dataset.slug;
        if (slug) showDetail(slug);
      });
    });
    document.getElementById('searchInput').value = S.search;
  }

  function redraw() {
    document.getElementById('radar-root').innerHTML = buildSVG();
    document.querySelectorAll('.dot-group').forEach(el => {
      el.addEventListener('click', () => showDetail(el.dataset.slug));
    });
  }

  async function showDetail(slug) {
    try {
      const tech = await GET(`/api/technologies/${slug}`);
      S.selTech = tech;
      const c = CLRS[S.trends.findIndex(t => t.id === tech.trend_id) % CLRS.length] || '#7c3aed';
      const panel = document.getElementById('detail-panel');
      panel.innerHTML = `
        <div style="padding:24px">
          <button onclick="document.getElementById('detail-panel').classList.remove('open')"
            style="background:none;border:none;color:var(--text3);font-size:20px;cursor:pointer;float:right">✕</button>
          <h2 style="color:${c};margin-bottom:8px">${tech.name}</h2>
          <p style="color:var(--text3);font-size:13px;margin-bottom:16px">TRL ${tech.trl} • ${tech.slug}</p>
          <p style="color:var(--text2);line-height:1.7">${tech.description_short || 'Нет описания'}</p>
          ${tech.description_full ? `<p style="color:var(--text2);line-height:1.7;margin-top:12px">${tech.description_full}</p>` : ''}
        </div>`;
      panel.classList.add('open');
    } catch (e) {
      console.error(e);
    }
  }

  /* ====================== CONTROLS ====================== */
  function doZoom(f) {
    S.zoom = Math.max(0.3, Math.min(4, S.zoom * f));
    document.getElementById('radar-root').style.transform = `scale(${S.zoom})`;
  }

  function resetAll() {
    S.search = ''; S.trlMin = 1; S.trlMax = 9; S.selTrends.clear(); S.zoom = 1;
    document.getElementById('searchInput').value = '';
    render();
  }

  function toggleSearch() {
    S.showSearch = !S.showSearch;
    document.getElementById('nav-search').classList.toggle('active', S.showSearch);
  }

  function toggleLeg() {}
  function toggleFilters() {}
  function goAdmin() {}
  function closeAdm() {}

  /* ====================== INIT ====================== */
  async function init() {
    try {
      await loadAll();
      document.getElementById('boot').style.display = 'none';
      render();
    } catch(e) {
      console.error('Ошибка:', e);
      document.getElementById('boot').innerHTML = `
        <div style="font-size:32px;color:#7c3aed">⊙</div>
        <div style="color:#f87171;font-family:Space Grotesk,sans-serif;font-size:13px">Нет подключения к API</div>
        <div style="color:#6b7a8f;font-size:12px">Запустите: go run ./cmd/api</div>
        <button onclick="init()" style="padding:10px 24px;background:#7c3aed;border:none;border-radius:10px;color:#fff;cursor:pointer;font-size:13px;margin-top:8px">Повторить</button>`;
    }
  }

  init();
</script>
</body>
</html>
