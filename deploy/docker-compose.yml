services:
  postgres:
    image: postgres:16
    container_name: radartcell-postgres
    environment:
      POSTGRES_DB: radar_tcell
      POSTGRES_USER: radar_tcell
      POSTGRES_PASSWORD: radar_tcell_password
    ports:
    - "15433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U radar_tcell -d radar_tcell"]
      interval: 3s
      timeout: 3s
      retries: 20
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: radartcell-redis
    ports:
      - "6379:6379"

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: radartcell-prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:11.1.4
    container_name: radartcell-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro

volumes:
  pgdata:
  grafana_data:
