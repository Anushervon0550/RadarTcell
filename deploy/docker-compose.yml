services:
  postgres:
    image: postgres:16
    container_name: radartcell_postgres
    environment:
      POSTGRES_DB: radartcell
      POSTGRES_USER: radartcell
      POSTGRES_PASSWORD: radartcell_password
    ports:
      - "5432:5432"
    volumes:
      - radartcell_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U radartcell -d radartcell"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7
    container_name: radartcell_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  radartcell_pgdata:
