name: radar-tcell

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: radar_tcell
      POSTGRES_USER: radar_tcell
      POSTGRES_PASSWORD: radar_tcell_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  pgdata:
